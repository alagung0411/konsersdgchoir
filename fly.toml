app = "nama-app-kamu"  # ganti sesuai nama app Fly.io

[build]
  image = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]