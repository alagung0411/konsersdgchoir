<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kelola Konser</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #001f3f, #004080);
      color: white;
      padding: 30px;
    }

    h2 {
      text-align: center;
      color: gold;
      margin-bottom: 30px;
    }

    form {
      background-color: white;
      color: #001f3f;
      width: 90%;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 20px;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      background-color: gold;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      color: #001f3f;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ffcc00;
    }

    .btn-kembali {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-kembali:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h2>Kelola Konser Baru</h2>

  <form method="POST" enctype="multipart/form-data">
    <label>Judul Konser</label>
    <input type="text" name="judul" required>

    <label>Tanggal</label>
    <input type="date" name="tanggal" required>

    <label>Lokasi</label>
    <input type="text" name="lokasi" required>

    <label>Deskripsi</label>
    <textarea name="deskripsi" required></textarea>

    <label>Upload Poster</label>
    <input type="file" name="poster" accept="image/*">

    <button type="submit">Simpan Konser</button>
  </form>

  <a href="/admin/dashboard" class="btn-kembali">← Kembali ke Dashboard</a>

  <h2>Daftar Konser</h2>
  <div style="max-width: 800px; margin: 0 auto;">
    {% for konser in konser_list %}
      <div style="background-color: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <strong>{{ konser.judul }}</strong><br>
          <small>{{ konser.tanggal }} - {{ konser.lokasi }}</small><br>
          <small>{{ konser.deskripsi }}</small>
        </div>
        <div style="display: flex; gap: 10px;">
          <!-- Tombol Hapus -->
          <form method="POST" action="/admin/delete_konser/{{ konser._id }}" onsubmit="return confirm('Yakin ingin menghapus konser ini?')">
            <button type="submit" style="background-color: red; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
              Hapus
            </button>
          </form>
          <!-- Tombol Edit -->
          <a href="/admin/edit_konser/{{ konser._id }}" style="background-color: gold; padding: 8px 15px; border-radius: 8px; text-decoration: none; color: #001f3f; font-weight: bold;">
            Edit
          </a>
        </div>
      </div>
    {% else %}
      <p style="text-align:center;">Belum ada konser.</p>
    {% endfor %}
  </div>
  

</body>
</html>
