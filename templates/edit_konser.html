<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Edit Konser</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #001f3f, #004080);
      color: white;
      padding: 30px;
    }

    form {
      background-color: white;
      color: #001f3f;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 5px;
    }

    textarea {
      min-height: 100px;
    }

    button {
      margin-top: 20px;
      background-color: gold;
      color: #001f3f;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h2 style="text-align:center; color: gold;">Edit Konser</h2>

  <form method="POST">
    <label>Judul Konser</label>
    <input type="text" name="judul" value="{{ konser.judul }}" required>

    <label>Tanggal</label>
    <input type="date" name="tanggal" value="{{ konser.tanggal }}" required>

    <label>Lokasi</label>
    <input type="text" name="lokasi" value="{{ konser.lokasi }}" required>

    <label>Deskripsi</label>
    <textarea name="deskripsi" required>{{ konser.deskripsi }}</textarea>

    <button type="submit">Simpan Perubahan</button>
  </form>

  <a href="/admin/konser">← Kembali</a>

</body>
</html>
