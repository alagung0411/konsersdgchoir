<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Verifikasi Pembayaran</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #001f3f, #004080);
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: gold;
      margin-bottom: 30px;
    }

    table {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      border-collapse: collapse;
      background-color: white;
      color: #001f3f;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #ccc;
    }

    th {
      background-color: gold;
      color: #001f3f;
      font-weight: 600;
    }

    tr:hover {
      background-color: #f9f9f9;
    }

    a.button {
      display: inline-block;
      padding: 8px 12px;
      margin: 4px;
      background-color: #004080;
      color: white;
      border-radius: 5px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #00264d;
    }

    .btn-delete {
      background-color: crimson;
    }

    .btn-delete:hover {
      background-color: darkred;
    }

    .btn-kembali {
      display: block;
      width: 200px;
      margin: 30px auto 0;
      text-align: center;
      background: gold;
      color: #001f3f;
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .btn-kembali:hover {
      background-color: #ffcc00;
    }
  </style>
</head>
<body>
  <h2>Verifikasi Pembayaran</h2>

  <table>
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Jumlah</th>
      <th>Kursi Dipesan</th>
      <th>Bukti Transfer</th>
      <th>Aksi</th>
    </tr>
    {% for t in transaksi %}
    <tr>
      <td>{{ t.username }}</td>
      <td>{{ t.email }}</td>
      <td>Rp{{ "{:,}".format(t.price)|replace(",", ".") }}</td>
      <td>{{ t.kursi | join(', ') }}</td>
      <td><a href="/{{ t.bukti_transfer }}" target="_blank" class="button">Lihat Bukti</a></td>
      <td>
        <a href="/admin/verifikasi/{{ t._id }}" class="button">Verifikasi</a>
        <a href="/admin/delete_verifikasi/{{ t._id }}" class="button btn-delete" onclick="return confirm('Yakin ingin menghapus transaksi ini?');">Hapus</a>
      </td>
    </tr>
    {% endfor %}
  </table>
  

  <a href="/admin/dashboard" class="btn-kembali">← Kembali ke Dashboard</a>
</body>
</html>
