<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ganti Password</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #001f3f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-box {
      background: white;
      color: #001f3f;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 400px;
    }

    .form-box h2 {
      margin-bottom: 20px;
    }

    .form-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .form-box button {
      width: 100%;
      background: gold;
      border: none;
      padding: 12px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .form-box button:hover {
      background: #ffcc00;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Ganti Password</h2>
    <form method="POST">
      <input type="password" name="old_password" placeholder="Password Lama" required>
      <input type="password" name="new_password" placeholder="Password Baru" required>
      <button type="submit">Simpan</button>
    </form>
  </div>
</body>
</html>
