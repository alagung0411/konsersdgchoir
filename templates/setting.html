<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Pengguna</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #001f3f, #004080);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .user-menu-box {
      background-color: #ffffff;
      color: #001f3f;
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .user-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin-bottom: 15px;
      object-fit: cover;
      border: 4px solid #ffcc00;
    }

    .username {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }

    .menu-button {
      background: linear-gradient(to right, #ffd700, #ffcc00);
      color: #001f3f;
      border: none;
      padding: 14px 20px;
      margin: 8px 0;
      font-weight: 600;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .menu-button:hover {
      background: #ffe100;
      transform: scale(1.03);
    }

    .ticket-section {
      margin-top: 25px;
      text-align: left;
    }

    .ticket-box {
      background-color: #f0f0f0;
      color: #001f3f;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .ticket-status {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .download-btn {
      background: #001f3f;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      transition: 0.3s;
    }

    .download-btn:hover {
      background: #003366;
    }

    .footer-info {
      margin-top: 30px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="user-menu-box">
    <img src="{{ user_avatar or "https://api.dicebear.com/7.x/adventurer/svg?seed=default123" }}" alt="Avatar User" class="user-avatar" />
    <div class="username">Halo, {{ username }}</div>

    <button class="menu-button" onclick="window.location.href='/cek'">Cek Pembelian Tiket</button>
    <button class="menu-button" onclick="window.location.href='/ganti-password'">Ganti Sandi</button>
    <button class="menu-button" onclick="window.location.href='/logout'">Logout</button>


</body>
</html>
