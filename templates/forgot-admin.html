<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lupa Password Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #001f3f, #004080);
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .forgot-container {
      background-color: #fff;
      color: #001f3f;
      padding: 35px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .forgot-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      background: linear-gradient(to right, #ffd700, #ffcc00);
      color: #001f3f;
      padding: 12px;
      border: none;
      width: 100%;
      font-weight: bold;
      font-size: 15px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #ffe600;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }

    .back-link a {
      color: #004080;
      text-decoration: none;
      font-weight: 600;
    }

    .flash-message {
      color: red;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <h2>Lupa Password Admin</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-message">
          {% for msg in messages %}
            {{ msg }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/forgot-admin">
      <div class="form-group">
        <label for="username">Username Admin</label>
        <input type="text" name="username" id="username" required />
      </div>
      <div class="form-group">
        <label for="email">Email Terdaftar</label>
        <input type="email" name="email" id="email" required />
      </div>
      <div class="form-group">
        <label for="new_password">Password Baru</label>
        <input type="password" name="new_password" id="new_password" required />
      </div>
      <button type="submit">Reset Password</button>
    </form>

    <div class="back-link">
      <a href="/">← Kembali ke Login</a>
    </div>
  </div>
</body>
</html>
