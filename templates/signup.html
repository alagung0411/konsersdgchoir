<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konser Paduan Suara - Daftar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(to right, #001f3f, #003366);
      color: #fff;
    }

    .wrapper {
      display: flex;
      width: 90%;
      max-width: 1100px;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0px 6px 25px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-out;
      color: #333;
    }

    .avatar-section {
      flex: 2;
      background: linear-gradient(to bottom right, #002B5B, #003366);
      color: #FFD700;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .avatar-section h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid gold;
      background: #fff;
      margin-bottom: 20px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .avatar-option {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid gold;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .avatar-option:hover {
      transform: scale(1.1);
    }

    .signup-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      animation: slideIn 0.8s ease-in-out;
    }

    .signup-section h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #002B5B;
      text-align: center;
    }

    .signup-section p {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin-bottom: 25px;
    }

    .signup-section a {
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-section form {
      max-width: 200px;
      margin: 10px;
      width: 100%;
    }

    .form-group {
      position: relative;
      margin-bottom: 20px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 40px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    .form-group .icon-left,
    .form-group .icon-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
    }

    .icon-left {
      left: 12px;
    }

    .icon-right {
      right: -70px;
      cursor: pointer;
    }

    .btn {
      width: 200px;
      display: block;
      margin-left: 40px;
      padding: 12px;
      background: linear-gradient(to right, #002B5B, #FFD700);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(to right, #001a33, #e6c200);
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes slideIn {
      0% {
        transform: translateX(30px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="avatar-section">
      <h1>Pilih Avatar Anda</h1>
      <div class="avatar">
        <img id="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=default123" alt="Avatar" />
        <input type="hidden" id="avatar-url" name="avatar" value="https://api.dicebear.com/7.x/adventurer/svg?seed=default123" />        
      </div>
      <button class="btn" type="button" onclick="generateAvatars()">Ganti Avatar</button>
      <div class="avatar-grid" id="avatar-grid"></div>
    </div>

    <div class="signup-section">
      <h2>Daftar Konser</h2>
      <p>Sudah punya akun? <a href="/">Masuk</a></p>
      <form method="POST" action="/signup">
        <div class="form-group">
          <i class="icon-left fas fa-user"></i>
          <input type="text" name="username" placeholder="Nama Pengguna" required>
        </div>
        <div class="form-group">
          <i class="icon-left fas fa-envelope"></i>
          <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <i class="icon-left fas fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Kata Sandi" required>
          <i class="icon-right fas fa-eye" id="toggle-password" onclick="togglePassword()"></i>
        </div>
        <input type="hidden" id="avatar-url" name="avatar" value="https://api.multiavatar.com/default123.svg" />
        <button type="submit" class="btn">Daftar</button>
      </form>
    </div>
  </div>

  <div class="footer">© 2025 Konser Paduan Suara. All rights reserved.</div>

  <!-- Font Awesome CDN (untuk ikon mata, email, dll) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <script>
    function generateAvatars() {
      const avatarGrid = document.getElementById('avatar-grid');
      avatarGrid.innerHTML = '';
    
      for (let i = 0; i < 12; i++) {
        const seed = Math.random().toString(36).substring(7);
        const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}`;
        const avatarOption = document.createElement('div');
        avatarOption.className = 'avatar-option';
        avatarOption.innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
        avatarOption.onclick = function () {
          document.getElementById('avatar').src = avatarUrl;
          document.getElementById('avatar-url').value = avatarUrl;
        };
        avatarGrid.appendChild(avatarOption);
      }
    }
    
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggle-password');

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = "password";
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }
  </script>
</body>
</html>
